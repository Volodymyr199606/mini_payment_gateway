          DATABASE_HOST: localhost
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
      - name: Run remaining RSpec (exclude AI gate paths)
        run: >
          bundle exec rspec spec
          --exclude-pattern "spec/ai/**/*_spec.rb,spec/docs/ai_platform_docs_spec.rb,spec/requests/dev/ai_*_spec.rb,spec/seeds/demo_seed_spec.rb"
          --format progress
        env:
