  # Remaining specs (excludes AI gate paths already run above)
  spec_rest:
    name: Spec (rest)
    needs: [setup, ai_contracts, ai_scenarios, ai_adversarial, ai_policy, ai_internal_tooling, ai_docs]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
